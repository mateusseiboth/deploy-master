# Infraestrutura de apoio do Deploy Master (não inclui os ambientes efêmeros,
# que são criados dinamicamente pelo DockerService).
services:
  postgres:
    image: postgres:16-alpine
    container_name: deploy-master-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deploy_master
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  traefik:
    image: traefik:v3.1
    container_name: deploy-master-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public

volumes:
  pgdata:

networks:
  traefik-public:
    name: traefik-public
